<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Four card feature section</title>
    <link rel="stylesheet" href="./assets/css/output.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="font-poppins">
    <main
      class="flex flex-col items-center justify-center min-h-screen bg-very-light-gray p-6"
    >
      <section>
        <div class="max-w-80 md:max-w-[30em] text-center">
          <h1 class="text-2xl md:text-3xl text-grey-400 font-extralight">
            Reliable, efficient delivery
          </h1>
          <h2 class="text-2xl md:text-3xl text-grey-500 font-semibold">
            Powered by Technology
          </h2>
          <p class="text-sm text-grey-400 font-normal my-4">
            Our Artificial Intelligence powered tools use millions of project
            data points to ensure that your project is successful
          </p>
        </div>
      </section>
      <section></section>
    </main>
    <!-- Reliable, efficient delivery Powered by Technology Our Artificial
    Intelligence powered tools use millions of project data points to ensure
    that your project is successful Supervisor Monitors activity to identify
    project roadblocks Team Builder Scans our talent network to create the
    optimal team for your project Karma Regularly evaluates our talent to ensure
    quality Calculator Uses data from past projects to provide better delivery
    estimates -->

    <footer>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Your Name Here</a>.
      </p>
    </footer>
  </body>
</html>
